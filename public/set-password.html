<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b457f" />
    <title>Set Password | Cedar Winds</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/ToolsLogo-192.png" />
    <link rel="apple-touch-icon" href="/icons/ToolsLogo-192.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell stack">
      <section class="hero">
        <img class="brand-logo" src="/icons/ToolsLogo.jpg" alt="Cedar Winds logo" />
        <h1>Set Your Password</h1>
        <p>Complete first-time setup or change your current password.</p>
        <div class="toolbar compact">
          <button id="refresh-button" class="button-ghost" type="button">Refresh</button>
        </div>
      </section>

      <section class="card">
        <form id="password-form" class="form-grid">
          <label>
            Current Password
            <input type="password" id="current-password" required placeholder="Current password" />
          </label>

          <label>
            New Password
            <input type="password" id="new-password" required minlength="8" placeholder="At least 8 characters" />
          </label>

          <label>
            Confirm New Password
            <input type="password" id="confirm-password" required minlength="8" placeholder="Repeat new password" />
          </label>

          <div id="message" class="notice info" hidden></div>

          <button type="submit" class="button-primary">Save Password</button>
        </form>
      </section>
    </main>

    <script src="/app.js"></script>
    <script>
      const form = document.getElementById("password-form");
      const message = document.getElementById("message");
      const params = new URLSearchParams(window.location.search);
      CedarApp.bindRefreshButton(document.getElementById("refresh-button"));

      (async () => {
        const user = await CedarApp.getCurrentUser();

        if (!user) {
          CedarApp.redirectToLogin("/set-password");
          return;
        }

        if (user.passwordResetRequired) {
          CedarApp.setMessage(message, "info", "You must set a new password before continuing.");
        }
      })().catch((error) => CedarApp.setMessage(message, "error", error.message));

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        CedarApp.clearMessage(message);

        const newPassword = document.getElementById("new-password").value;
        const confirmPassword = document.getElementById("confirm-password").value;

        if (newPassword !== confirmPassword) {
          CedarApp.setMessage(message, "error", "New passwords do not match.");
          return;
        }

        try {
          await CedarApp.request("/api/change-password", {
            method: "POST",
            body: JSON.stringify({
              currentPassword: document.getElementById("current-password").value,
              newPassword
            })
          });

          const next = params.get("next") || "/scanner";
          window.location.href = next;
        } catch (error) {
          CedarApp.setMessage(message, "error", error.message);
        }
      });
    </script>
  </body>
</html>
