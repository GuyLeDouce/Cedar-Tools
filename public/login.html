<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Cedar Winds</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell stack">
      <section class="hero">
        <h1>Secure Sign-In</h1>
        <p>Use your Cedar Winds email and password to continue.</p>
      </section>

      <section class="card">
        <form id="login-form" class="form-grid">
          <label>
            Email
            <input type="email" id="email" required placeholder="name@cedarwinds.ca" />
          </label>

          <label>
            Password
            <input type="password" id="password" required placeholder="Password" />
          </label>

          <div id="message" class="notice info" hidden></div>

          <button type="submit" class="button-primary">Log In</button>
          <p class="meta">Default seeded password: <strong>Cedar123!</strong></p>
        </form>
      </section>
    </main>

    <script src="/app.js"></script>
    <script>
      const form = document.getElementById("login-form");
      const message = document.getElementById("message");
      const params = new URLSearchParams(window.location.search);

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        CedarApp.clearMessage(message);

        try {
          await CedarApp.request("/login", {
            method: "POST",
            body: JSON.stringify({
              email: document.getElementById("email").value,
              password: document.getElementById("password").value
            })
          });

          const next = params.get("next") || "/scanner";
          window.location.href = next;
        } catch (error) {
          CedarApp.setMessage(message, "error", error.message);
        }
      });
    </script>
  </body>
</html>
