<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b457f" />
    <title>Login | Cedar Winds</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" href="/icons/ToolsLogo-192.png" />
    <link rel="apple-touch-icon" href="/icons/ToolsLogo-192.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell stack">
      <section class="hero">
        <img class="brand-logo" src="/icons/ToolsLogo.jpg" alt="Cedar Winds logo" />
        <h1>Secure Sign-In</h1>
        <p>Use your username or email and password to continue.</p>
        <div class="toolbar compact">
          <button id="install-app-button" class="button-ghost" type="button" hidden>Install App</button>
        </div>
      </section>

      <section class="card">
        <form id="login-form" class="form-grid">
          <label>
            Username or Email
            <input type="text" id="identifier" required placeholder="nelson or nelson@thebetterwaytobuild.com" />
          </label>

          <label>
            Password
            <input type="password" id="password" required placeholder="Password" />
          </label>

          <div id="message" class="notice info" hidden></div>

          <button type="submit" class="button-primary">Log In</button>
          <p class="meta">New and reset accounts are required to set a new password after login.</p>
        </form>
      </section>
    </main>

    <script src="/app.js"></script>
    <script>
      const form = document.getElementById("login-form");
      const message = document.getElementById("message");
      const params = new URLSearchParams(window.location.search);

      CedarApp.bindInstallButton(document.getElementById("install-app-button"));

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        CedarApp.clearMessage(message);

        try {
          const result = await CedarApp.request("/login", {
            method: "POST",
            body: JSON.stringify({
              identifier: document.getElementById("identifier").value,
              password: document.getElementById("password").value
            })
          });

          const next = params.get("next") || CedarApp.getDefaultRouteForRole(result.user);
          if (result.user?.passwordResetRequired) {
            window.location.href = `/set-password?next=${encodeURIComponent(next)}`;
            return;
          }

          window.location.href = next;
        } catch (error) {
          CedarApp.setMessage(message, "error", error.message);
        }
      });
    </script>
  </body>
</html>
